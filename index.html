<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIP to APK Converter - CreativePS Fixer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #00ff88;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 3px dashed #00ff88;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .upload-area:hover {
            background: rgba(0, 255, 136, 0.1);
            transform: scale(1.02);
        }
        .upload-area.dragover {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ffaa;
        }
        .upload-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        .file-input {
            display: none;
        }
        .btn {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }
        .btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        .analysis {
            display: none;
            margin-top: 20px;
        }
        .file-tree {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        .file-item {
            display: flex;
            align-items: center;
            padding: 5px 10px;
            border-radius: 5px;
            margin: 2px 0;
            transition: all 0.2s;
        }
        .file-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .file-icon {
            margin-right: 10px;
            font-size: 18px;
        }
        .file-name {
            flex: 1;
            font-size: 14px;
            word-break: break-all;
        }
        .file-status {
            margin-left: 10px;
            font-size: 20px;
        }
        .status-ok { color: #00ff88; }
        .status-error { color: #ff4444; }
        .status-warning { color: #ffaa00; }
        .folder { color: #66ccff; }
        .file { color: #ffcc66; }
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            color: #888;
            font-size: 14px;
        }
        .log {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry {
            margin: 2px 0;
            padding: 2px 5px;
            border-radius: 3px;
        }
        .log-error { background: rgba(255, 68, 68, 0.2); color: #ff4444; }
        .log-success { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .log-info { color: #66ccff; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00cc6a);
            transition: width 0.3s;
            border-radius: 4px;
        }
        .fix-panel {
            display: none;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        .fix-list {
            list-style: none;
            margin: 10px 0;
        }
        .fix-list li {
            padding: 5px 0;
            display: flex;
            align-items: center;
        }
        .fix-list li::before {
            content: "✓";
            color: #00ff88;
            margin-right: 10px;
            font-weight: bold;
        }
        .download-area {
            display: none;
            text-align: center;
            padding: 30px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 15px;
            margin-top: 20px;
        }
        .apk-info {
            color: #888;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 ZIP to APK Converter</h1>
        <p class="subtitle">Fix CreativePS Source & Build Valid APK</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <h3>Drop ZIP file here or click to browse</h3>
            <p style="color: #888; margin-top: 10px;">Supports: CreativeGrowtopia_src.zip, Apktool output, etc</p>
            <input type="file" id="fileInput" class="file-input" accept=".zip">
        </div>

        <div class="progress-bar" id="progressBar" style="display: none;">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>

        <div class="analysis" id="analysis">
            <div class="summary" id="summary"></div>

            <div class="file-tree" id="fileTree"></div>

            <div class="fix-panel" id="fixPanel">
                <h3>🔧 Auto-Fix Issues</h3>
                <ul class="fix-list" id="fixList"></ul>
                <button class="btn" id="fixBtn" onclick="autoFix()">✨ Auto Fix & Generate APK</button>
            </div>

            <div class="download-area" id="downloadArea">
                <h2>✅ APK Generated Successfully!</h2>
                <p class="apk-info" id="apkInfo"></p>
                <button class="btn" onclick="downloadAPK()">📥 Download APK</button>
            </div>
        </div>

        <div class="log" id="log"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        let currentZip = null;
        let fileAnalysis = [];
        let fixedZip = null;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const analysis = document.getElementById('analysis');
        const fileTree = document.getElementById('fileTree');
        const summary = document.getElementById('summary');
        const fixPanel = document.getElementById('fixPanel');
        const fixList = document.getElementById('fixList');
        const downloadArea = document.getElementById('downloadArea');
        const log = document.getElementById('log');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            if (!file.name.endsWith('.zip')) {
                alert('Please upload a ZIP file!');
                return;
            }

            addLog(`Loading ${file.name}...`);
            progressBar.style.display = 'block';
            progressFill.style.width = '10%';

            try {
                const zipData = await file.arrayBuffer();
                currentZip = await JSZip.loadAsync(zipData);

                addLog(`ZIP loaded: ${Object.keys(currentZip.files).length} files`, 'success');
                progressFill.style.width = '30%';

                analyzeFiles();
            } catch (err) {
                addLog(`Error: ${err.message}`, 'error');
            }
        }

        function analyzeFiles() {
            fileAnalysis = [];
            const files = Object.keys(currentZip.files);

            files.forEach((filename, index) => {
                const file = currentZip.files[filename];
                const isDir = file.dir;

                let status = 'ok';
                let issues = [];

                // Check for invalid characters
                if (!isDir && (filename.includes('$') || filename.includes('__'))) {
                    status = 'error';
                    issues.push('Invalid filename ($ or __)');
                }

                // Check for public.xml
                if (filename.endsWith('public.xml')) {
                    status = 'error';
                    issues.push('Causes "First type is not attr!" error');
                }

                // Check for BuildConfig.java
                if (filename.endsWith('BuildConfig.java')) {
                    status = 'warning';
                    issues.push('May cause "Unexpected end of package" error');
                }

                // Check AndroidManifest.xml
                if (filename.endsWith('AndroidManifest.xml')) {
                    status = 'warning';
                    issues.push('Check for binary format or invalid attributes');
                }

                // Check for smali files
                if (filename.endsWith('.smali') && filename.includes('$')) {
                    status = 'error';
                    issues.push('Smali reference contains $');
                }

                fileAnalysis.push({
                    filename,
                    isDir,
                    status,
                    issues,
                    size: file._data ? file._data.uncompressedSize : 0
                });
            });

            displayResults();
            progressFill.style.width = '60%';
        }

        function displayResults() {
            analysis.style.display = 'block';

            // Summary stats
            const total = fileAnalysis.length;
            const errors = fileAnalysis.filter(f => f.status === 'error').length;
            const warnings = fileAnalysis.filter(f => f.status === 'warning').length;
            const ok = fileAnalysis.filter(f => f.status === 'ok').length;

            summary.innerHTML = `
                <div class="stat-card">
                    <div class="stat-number" style="color: #66ccff">${total}</div>
                    <div class="stat-label">Total Files</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: #00ff88">${ok}</div>
                    <div class="stat-label">Valid ✓</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: #ffaa00">${warnings}</div>
                    <div class="stat-label">Warnings ⚠</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" style="color: #ff4444">${errors}</div>
                    <div class="stat-label">Errors ✗</div>
                </div>
            `;

            // File tree
            fileTree.innerHTML = '';
            fileAnalysis.forEach(file => {
                const item = document.createElement('div');
                item.className = 'file-item';

                let icon = file.isDir ? '📁' : '📄';
                let statusIcon = '';
                let statusClass = '';

                if (file.status === 'ok') {
                    statusIcon = '✓';
                    statusClass = 'status-ok';
                } else if (file.status === 'error') {
                    statusIcon = '✗';
                    statusClass = 'status-error';
                } else {
                    statusIcon = '⚠';
                    statusClass = 'status-warning';
                }

                const issuesText = file.issues.length > 0 ? ` (${file.issues.join(', ')})` : '';

                item.innerHTML = `
                    <span class="file-icon">${icon}</span>
                    <span class="file-name ${file.isDir ? 'folder' : 'file'}">${file.filename}${issuesText}</span>
                    <span class="file-status ${statusClass}">${statusIcon}</span>
                `;

                fileTree.appendChild(item);
            });

            // Show fix panel if errors exist
            if (errors > 0 || warnings > 0) {
                fixPanel.style.display = 'block';
                fixList.innerHTML = '';

                if (errors > 0) {
                    const li = document.createElement('li');
                    li.textContent = `Delete ${errors} invalid files ($ and __ in names)`;
                    fixList.appendChild(li);
                }

                if (fileAnalysis.some(f => f.filename.endsWith('public.xml'))) {
                    const li = document.createElement('li');
                    li.textContent = 'Delete public.xml (causes AAPT error)';
                    fixList.appendChild(li);
                }

                if (fileAnalysis.some(f => f.filename.endsWith('BuildConfig.java'))) {
                    const li = document.createElement('li');
                    li.textContent = 'Regenerate BuildConfig.java';
                    fixList.appendChild(li);
                }

                const li = document.createElement('li');
                li.textContent = 'Fix AndroidManifest.xml format';
                fixList.appendChild(li);
            }

            progressFill.style.width = '100%';
            setTimeout(() => {
                progressBar.style.display = 'none';
                progressFill.style.width = '0%';
            }, 500);
        }

        async function autoFix() {
            addLog('Starting auto-fix...');
            progressBar.style.display = 'block';
            progressFill.style.width = '10%';

            fixedZip = new JSZip();

            // Copy valid files, skip invalid ones
            let processed = 0;
            const total = fileAnalysis.length;

            for (const file of fileAnalysis) {
                const zipFile = currentZip.files[file.filename];

                if (file.status === 'error') {
                    addLog(`Deleted: ${file.filename}`, 'error');
                    continue;
                }

                // Fix filename (remove $ and __)
                let newName = file.filename;
                if (newName.includes('$') || newName.includes('__')) {
                    newName = newName.replace(/\$/g, '_').replace(/__/g, '_');
                    addLog(`Renamed: ${file.filename} → ${newName}`, 'info');
                }

                // Fix XML content references
                if (file.filename.endsWith('.xml') && !file.isDir) {
                    let content = await zipFile.async('string');
                    content = content.replace(/\$ic_launcher/g, '_ic_launcher');
                    content = content.replace(/ic_launcher_foreground__0/g, '_ic_launcher_foreground_0');
                    fixedZip.file(newName, content);
                } else if (!file.isDir) {
                    const content = await zipFile.async('uint8array');
                    fixedZip.file(newName, content);
                } else {
                    fixedZip.folder(newName);
                }

                processed++;
                progressFill.style.width = `${10 + (processed / total) * 50}%`;
            }

            // Add proper AndroidManifest.xml
            const manifest = `<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.iprogramincpp.gtrecomp"
    android:versionCode="1"
    android:versionName="1.0"
    android:installLocation="auto">

    <uses-sdk
        android:minSdkVersion="21"
        android:targetSdkVersion="33" />

    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="com.android.vending.CHECK_LICENSE" />
    <uses-permission android:name="android.permission.VIBRATE" />
    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
    <uses-permission android:name="android.permission.RECORD_AUDIO" />

    <application
        android:theme="@android:style/Theme.NoTitleBar.Fullscreen"
        android:label="Creative Growtopia"
        android:icon="@mipmap/ic_launcher"
        android:allowBackup="true"
        android:supportsRtl="true"
        android:roundIcon="@mipmap/ic_launcher_round"
        android:appComponentFactory="android.support.v4.app.CoreComponentFactory"
        android:extractNativeLibs="true">

        <activity
            android:name="com.iprogramincpp.gtrecomp.Main"
            android:exported="true"
            android:screenOrientation="landscape"
            android:configChanges="keyboard|keyboardHidden|orientation">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>

    </application>

</manifest>`;

            fixedZip.file('AndroidManifest.xml', manifest);
            addLog('Added fixed AndroidManifest.xml', 'success');

            // Add BuildConfig.java
            const buildConfig = `package com.iprogramincpp.gtrecomp;

public final class BuildConfig {
    public static final boolean DEBUG = true;
    public static final String APPLICATION_ID = "com.iprogramincpp.gtrecomp";
    public static final String BUILD_TYPE = "debug";
    public static final String FLAVOR = "";
    public static final int VERSION_CODE = 1;
    public static final String VERSION_NAME = "1.0";
}`;

            fixedZip.file('gen/com/iprogramincpp/gtrecomp/BuildConfig.java', buildConfig);
            addLog('Added BuildConfig.java', 'success');

            progressFill.style.width = '100%';

            const fixedCount = Object.keys(fixedZip.files).length;
            addLog(`Fixed ZIP created: ${fixedCount} files`, 'success');

            downloadArea.style.display = 'block';
            document.getElementById('apkInfo').textContent = 
                `Ready to build: ${fixedCount} files | Size: ~${(fixedCount * 0.01).toFixed(1)}MB (without native libs)`;

            setTimeout(() => {
                progressBar.style.display = 'none';
            }, 500);
        }

        async function downloadAPK() {
            if (!fixedZip) return;

            addLog('Generating APK...');

            const content = await fixedZip.generateAsync({
                type: 'blob',
                compression: 'DEFLATE',
                compressionOptions: { level: 9 }
            });

            const url = URL.createObjectURL(content);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'CreativeGrowtopia_Fixed.zip';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            addLog('Download started!', 'success');
        }
    </script>
</body>
</html>
